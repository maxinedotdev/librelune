name: Release + F-Droid

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write

env:
    JAVA_VERSION: "17"

jobs:
    build-release:
        name: Build Signed Release APK
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: ${{ env.JAVA_VERSION }}

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Prepare Android release keystore
              shell: bash
              run: |
                  set -euo pipefail
                  if [[ -z "${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}" ]]; then
                    echo "ANDROID_RELEASE_KEYSTORE_B64 is required to build a signed release APK."
                    exit 1
                  fi
                  KEYSTORE_PATH="$RUNNER_TEMP/librelune-release.jks"
                  echo "${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}" | base64 --decode > "$KEYSTORE_PATH"
                  echo "LIBRELUNE_RELEASE_STORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

            - name: Assemble signed release APK
              env:
                  LIBRELUNE_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
                  LIBRELUNE_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
                  LIBRELUNE_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
              shell: bash
              run: |
                  set -euo pipefail
                  chmod +x ./gradlew
                  ./gradlew assembleRelease

            - name: Verify release APK exists
              shell: bash
              run: |
                  set -euo pipefail
                  test -f app/build/outputs/apk/release/app-release.apk
                  ls -lh app/build/outputs/apk/release/app-release.apk

            - name: Upload release artifact
              uses: actions/upload-artifact@v4
              with:
                  name: app-release-apk
                  path: app/build/outputs/apk/release/app-release.apk
                  if-no-files-found: error

    publish-fdroid:
        name: Publish F-Droid Repo
        runs-on: ubuntu-latest
        needs: build-release
        if: ${{
            secrets.FDROID_KEYSTORE_B64 != '' &&
            secrets.FDROID_KEYSTORE_PASSWORD != '' &&
            secrets.FDROID_KEY_ALIAS != '' &&
            secrets.FDROID_KEY_PASSWORD != '' &&
            secrets.FDROID_REPO_URL != ''
            }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download built APK
              uses: actions/download-artifact@v8
              with:
                  name: app-release-apk
                  path: fdroid/repo

            - name: Install fdroidserver
              shell: bash
              run: |
                  set -euo pipefail
                  sudo apt-get update
                  sudo apt-get install -y fdroidserver

            - name: Prepare F-Droid signing material
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p fdroid
                  echo "${{ secrets.FDROID_KEYSTORE_B64 }}" | base64 --decode > fdroid/fdroid-keystore.jks

            - name: Generate fdroid config.py
              shell: bash
              run: |
                  set -euo pipefail
                  cat > fdroid/config.py <<'PYCFG'
                  repo_name = 'Librelune F-Droid Repo'
                  repo_url = '${{ secrets.FDROID_REPO_URL }}'
                  repo_description = 'Automated F-Droid repository for Librelune.'
                  keystore = 'fdroid-keystore.jks'
                  keystorepass = '${{ secrets.FDROID_KEYSTORE_PASSWORD }}'
                  keypass = '${{ secrets.FDROID_KEY_PASSWORD }}'
                  repo_keyalias = '${{ secrets.FDROID_KEY_ALIAS }}'
                  make_current_version_link = False
                  archive_older = 0
                  PYCFG

            - name: Build F-Droid index
              shell: bash
              run: |
                  set -euo pipefail
                  cd fdroid
                  fdroid update --create-metadata --rename-apks --pretty

            - name: Add Pages landing file
              shell: bash
              run: |
                  set -euo pipefail
                  cp site/index.html fdroid/repo/index.html

            - name: Publish F-Droid repo to gh-pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_branch: gh-pages
                  publish_dir: fdroid/repo
                  force_orphan: true

            - name: Report repository URL
              shell: bash
              run: |
                  echo "Published F-Droid repo to gh-pages."
                  echo "Set your F-Droid client repo URL to: ${{ secrets.FDROID_REPO_URL }}"
