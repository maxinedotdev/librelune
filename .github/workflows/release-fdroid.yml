name: Release + F-Droid

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

# Minimal default permissions; each job escalates only what it needs.
permissions:
    contents: none

# Only one release pipeline at a time; never cancel an in-flight run.
concurrency:
    group: release
    cancel-in-progress: false

env:
    JAVA_VERSION: "21"

jobs:
    build-release:
        name: Build Release APK
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up JDK
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: ${{ env.JAVA_VERSION }}
                  cache: gradle

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v6

            - name: Write signing config
              env:
                  ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
                  ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
                  ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
                  ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
              shell: bash
              run: |
                  set -euo pipefail
                  if [[ -n "$ANDROID_RELEASE_KEYSTORE_B64" ]]; then
                      KEYSTORE_PATH="$RUNNER_TEMP/librelune-release.jks"
                      printf '%s' "$ANDROID_RELEASE_KEYSTORE_B64" | base64 -d > "$KEYSTORE_PATH"

                      STORE_PASSWORD="$(printf '%s' "$ANDROID_RELEASE_STORE_PASSWORD" | tr -d '\r\n')"
                      KEY_ALIAS="$(printf '%s' "$ANDROID_RELEASE_KEY_ALIAS" | tr -d '\r\n')"
                      KEY_PASSWORD="$(printf '%s' "$ANDROID_RELEASE_KEY_PASSWORD" | tr -d '\r\n')"

                      umask 077
                      printf '%s\n' "LIBRELUNE_RELEASE_STORE_FILE=$KEYSTORE_PATH" > keystore.properties
                      printf '%s\n' "LIBRELUNE_RELEASE_STORE_PASSWORD=$STORE_PASSWORD" >> keystore.properties
                      printf '%s\n' "LIBRELUNE_RELEASE_KEY_ALIAS=$KEY_ALIAS" >> keystore.properties
                      printf '%s\n' "LIBRELUNE_RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> keystore.properties
                      chmod 600 keystore.properties "$KEYSTORE_PATH"
                      echo "::notice::Keystore present — APK will be release-signed."
                  else
                      echo "::warning::ANDROID_RELEASE_KEYSTORE_B64 not set — APK will be unsigned."
                  fi

            - name: Assemble release APK
              shell: bash
              run: |
                  set -euo pipefail
                  chmod +x ./gradlew
                  ./gradlew assembleRelease

            - name: Clean signing config
              if: always()
              shell: bash
              run: rm -f keystore.properties "$RUNNER_TEMP/librelune-release.jks"

            - name: Upload release APK artifact
              uses: actions/upload-artifact@v7
              with:
                  name: app-release-apk
                  path: app/build/outputs/apk/release/app-release.apk
                  if-no-files-found: error

    github-release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: build-release
        if: startsWith(github.ref, 'refs/tags/')
        permissions:
            contents: write
            discussions: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Download APK
              uses: actions/download-artifact@v8
              with:
                  name: app-release-apk
                  path: dist

            - name: Create GitHub Release
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  gh release create "$GITHUB_REF_NAME" \
                      --generate-notes \
                      --title "Librelune $GITHUB_REF_NAME" \
                      dist/app-release.apk

    check-fdroid-secrets:
        name: Check F-Droid Secrets
        runs-on: ubuntu-latest
        needs: build-release
        outputs:
            ready: ${{ steps.check.outputs.ready }}
        steps:
            - id: check
              shell: bash
              env:
                  FDROID_KEYSTORE_B64: ${{ secrets.FDROID_KEYSTORE_B64 }}
                  FDROID_KEYSTORE_PASSWORD: ${{ secrets.FDROID_KEYSTORE_PASSWORD }}
                  FDROID_KEY_ALIAS: ${{ secrets.FDROID_KEY_ALIAS }}
                  FDROID_KEY_PASSWORD: ${{ secrets.FDROID_KEY_PASSWORD }}
                  FDROID_REPO_URL: ${{ secrets.FDROID_REPO_URL }}
              run: |
                  if [[ -n "$FDROID_KEYSTORE_B64" && \
                        -n "$FDROID_KEYSTORE_PASSWORD" && \
                        -n "$FDROID_KEY_ALIAS" && \
                        -n "$FDROID_KEY_PASSWORD" && \
                        -n "$FDROID_REPO_URL" ]]; then
                      echo "ready=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "ready=false" >> "$GITHUB_OUTPUT"
                      echo "::notice::F-Droid secrets not configured — skipping publish."
                  fi

    publish-fdroid:
        name: Publish F-Droid Repo
        runs-on: ubuntu-latest
        needs: [build-release, check-fdroid-secrets]
        if: needs.check-fdroid-secrets.outputs.ready == 'true'
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Download built APK
              uses: actions/download-artifact@v8
              with:
                  name: app-release-apk
                  path: fdroid/repo

            - name: Install fdroidserver
              shell: bash
              run: |
                  set -euo pipefail
                  sudo apt-get update -qq
                  sudo apt-get install -y fdroidserver

            - name: Prepare F-Droid keystore
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p fdroid
                  printf '%s' "${{ secrets.FDROID_KEYSTORE_B64 }}" | base64 -d > fdroid/fdroid-keystore.jks

            - name: Generate fdroid config.py
              shell: bash
              run: |
                  set -euo pipefail
                  cat > fdroid/config.py <<'PYCFG'
                  repo_name = 'Librelune F-Droid Repo'
                  repo_url = '${{ secrets.FDROID_REPO_URL }}'
                  repo_description = 'Automated F-Droid repository for Librelune.'
                  keystore = 'fdroid-keystore.jks'
                  keystorepass = '${{ secrets.FDROID_KEYSTORE_PASSWORD }}'
                  keypass = '${{ secrets.FDROID_KEY_PASSWORD }}'
                  repo_keyalias = '${{ secrets.FDROID_KEY_ALIAS }}'
                  make_current_version_link = False
                  archive_older = 0
                  PYCFG

            - name: Build F-Droid index
              shell: bash
              run: |
                  set -euo pipefail
                  cd fdroid
                  fdroid update --create-metadata --rename-apks --pretty

            - name: Add landing page
              shell: bash
              run: cp site/index.html fdroid/repo/index.html

            - name: Publish to gh-pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_branch: gh-pages
                  publish_dir: fdroid/repo
                  force_orphan: true

            - name: Print repo URL
              shell: bash
              run: echo "F-Droid repo published → ${{ secrets.FDROID_REPO_URL }}"
